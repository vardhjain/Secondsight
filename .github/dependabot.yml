# Dependabot configuration for Secondsight.
#
# Keeps Python dependencies (declared in pyproject.toml) and GitHub Actions
# pinned in the workflows up to date with weekly pull requests.
version: 2
updates:
  # Python package dependencies (pip ecosystem reads pyproject.toml).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "build"
      include: "scope"

  # GitHub Actions used in the CI workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
