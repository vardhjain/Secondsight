# Market-1501 strong-baseline configuration (the headline recipe).
#
# This folds in every model improvement over the original notebook:
#   * identity-balanced PK sampler (batch_size 64 / num_instances 4 -> P=16, K=4)
#   * GeM pooling and last_stride=1 in ResNet layer4
#   * label-smoothed cross-entropy + batch-hard triplet + center loss
#   * LR warmup followed by a multistep decay schedule
#   * AMP mixed precision
#   * L2-normalized (cosine) features at eval, with horizontal-flip TTA
#   * k-reciprocal re-ranking
#
# IBN backbone is left off by default (download/availability dependent); flip
# ``model.ibn`` to true to enable it when the IBN-Net weights are reachable.

data:
  root: null
  height: 256
  width: 128
  batch_size: 64
  num_instances: 4
  num_workers: 4
  pad: 10
  random_erasing: true
  re_prob: 0.5

model:
  name: resnet50
  pretrained: true
  last_stride: 1
  pooling: gem
  ibn: false
  feat_dim: 2048

loss:
  id_weight: 1.0
  triplet_weight: 1.0
  triplet_margin: 0.3
  soft_margin: false
  label_smoothing: 0.1
  center_loss: true
  center_weight: 0.0005
  center_lr: 0.5

optim:
  name: adam
  lr: 0.00035
  weight_decay: 0.0005
  scheduler: warmup_multistep
  milestones:
    - 30
    - 50
  gamma: 0.1
  warmup_epochs: 10
  warmup_factor: 0.01

eval:
  feat_norm: true
  flip_tta: true
  rerank: true
  rerank_k1: 20
  rerank_k2: 6
  rerank_lambda: 0.3
  max_rank: 50

train:
  max_epochs: 60
  amp: true
  seed: 42
  device: cuda
  log_period: 50
  eval_period: 10
  output_dir: outputs
