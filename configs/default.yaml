# Default Re-ID configuration.
#
# This file mirrors the dataclass defaults defined in ``reid.config`` exactly.
# It is a conservative baseline; the headline "strong baseline" recipe lives in
# ``configs/market1501_strong_baseline.yaml``.

data:
  root: null
  height: 256
  width: 128
  batch_size: 64
  num_instances: 4
  num_workers: 4
  pad: 10
  random_erasing: true
  re_prob: 0.5

model:
  name: resnet50
  pretrained: true
  last_stride: 1
  pooling: gem
  ibn: false
  feat_dim: 2048

loss:
  id_weight: 1.0
  triplet_weight: 1.0
  triplet_margin: 0.3
  soft_margin: false
  label_smoothing: 0.1
  center_loss: false
  center_weight: 0.0005
  center_lr: 0.5

optim:
  name: adam
  lr: 0.00035
  weight_decay: 0.0005
  scheduler: warmup_multistep
  milestones:
    - 30
    - 50
  gamma: 0.1
  warmup_epochs: 10
  warmup_factor: 0.01

eval:
  feat_norm: true
  flip_tta: true
  rerank: true
  rerank_k1: 20
  rerank_k2: 6
  rerank_lambda: 0.3
  max_rank: 50

train:
  max_epochs: 60
  amp: true
  seed: 42
  device: cuda
  log_period: 50
  eval_period: 10
  output_dir: outputs
